name: xanesnetsoftshell
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - ase=3.22.1
  - matplotlib=3.4.3
  - numpy=1.22
  - pyemd=0.5.1
  - scikit-learn=1.2.0
  - seaborn=0.11.2
  - tqdm=4.62.3
  - pyyaml=6.0
  - mlflow=2.1.1
  - optuna=3.1.1
  - pytest=8.3.3
  - sphinx=7.2.5
  - sphinx_rtd_theme=1.3.0
  - pyscf=2.4.0

  # Some packages are only pip-installable:
  - pip:
      - torch==2.1.2
      - torchinfo==1.7.1
      - dscribe==1.2.2
      - shap==0.44.0
      - torch_geometric==2.5.3
      - tblite==0.3.0
      - mace-torch==0.3.6

      # TensorFlow: platform-specific conditions
      - tensorflow-macos==2.9 ; sys_platform == "darwin"
      - tensorflow==2.9.2 ; sys_platform != "darwin"

      # finally install your package
      - .

