$schema: https://json-schema.org/draft/2020-12/schema
$id: early_stopper_types.schema.yaml
title: XANESNET early-stopper value types
$defs:
  earlyStopperType:
    type: string
    enum:
    - none
    - 'no'
    - basic
    - time
    description: Early-stopper registry key accepted by ``EarlyStopperRegistry.get``.
  earlyStopperTypeNoneOrNo:
    type: string
    enum:
    - none
    - 'no'
    description: Aliases registered to the no-op early stopper.
description: Early-stopper schemas backed by ``EarlyStopperRegistry`` classes.
