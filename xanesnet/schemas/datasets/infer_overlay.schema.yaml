$schema: https://json-schema.org/draft/2020-12/schema
$id: infer_overlay.schema.yaml
title: XANESNET inference dataset overlay schema
$defs:
  datasetInferOverlay:
    type: object
    additionalProperties: false
    properties:
      num_workers:
        type:
        - integer
        - 'null'
        default: null
        $comment: null or non-positive means use os.cpu_count() in the multiprocessing mixin.
        description: Requested worker process count.
      quadruplets:
        type: boolean
        default: false
        description: Whether to compute quadruplet indices.
      oc_mode:
        type: boolean
        default: false
        description: Whether to precompute GemNet-OC auxiliary graphs and mixed triplets.
      oc_cutoff_aeaint:
        type:
        - number
        - 'null'
        default: null
        description: Atom-edge-atom graph cutoff in **Angstrom**.
      oc_max_neighbors_aeaint:
        type:
        - integer
        - 'null'
        default: null
        description: Atom-edge-atom graph per-source neighbor cap.
      oc_cutoff_aint:
        type:
        - number
        - 'null'
        default: null
        description: Atom-atom graph cutoff in **Angstrom**.
      oc_max_neighbors_aint:
        type:
        - integer
        - 'null'
        default: null
        description: Atom-atom graph per-source neighbor cap.
      cutoff:
        type: number
        default: 5.0
        description: Main graph cutoff in **Angstrom**.
      max_num_neighbors:
        type: integer
        minimum: 1
        default: 32
        description: Main graph per-source neighbor cap.
      graph_method:
        $ref: graph_types.schema.yaml#/$defs/graphMethod
        default: radius
        description: Main graph construction method.
      min_facet_area:
        $ref: graph_types.schema.yaml#/$defs/minFacetArea
        default: null
        description: Numeric area threshold or strings such as "5%".
      cov_radii_scale:
        type: number
        default: 1.5
        description: Covalent-radii scale for graph construction.
      int_cutoff:
        type:
        - number
        - 'null'
        default: 10.0
        description: Interaction graph cutoff in **Angstrom**.
      int_max_neighbors:
        type:
        - integer
        - 'null'
        default: null
        description: Optional interaction graph per-source neighbor cap.
      int_graph_method:
        oneOf:
        - $ref: graph_types.schema.yaml#/$defs/graphMethod
        - type: 'null'
        default: null
        description: Optional interaction graph construction method.
      int_min_facet_area:
        $ref: graph_types.schema.yaml#/$defs/minFacetArea
        default: null
        description: Numeric area threshold or strings such as "5%".
      int_cov_radii_scale:
        type:
        - number
        - 'null'
        default: null
        description: Optional interaction covalent-radii scale.
      oc_graph_method_aeaint:
        oneOf:
        - $ref: graph_types.schema.yaml#/$defs/graphMethod
        - type: 'null'
        default: null
        description: Atom-edge-atom graph construction method override.
      oc_min_facet_area_aeaint:
        $ref: graph_types.schema.yaml#/$defs/minFacetArea
        default: null
        description: Numeric area threshold or strings such as "5%".
      oc_cov_radii_scale_aeaint:
        type:
        - number
        - 'null'
        default: null
        description: Atom-edge-atom covalent-radii scale.
      oc_graph_method_aint:
        oneOf:
        - $ref: graph_types.schema.yaml#/$defs/graphMethod
        - type: 'null'
        default: null
        description: Atom-atom graph construction method override.
      oc_min_facet_area_aint:
        $ref: graph_types.schema.yaml#/$defs/minFacetArea
        default: null
        description: Numeric area threshold or strings such as "5%".
      oc_cov_radii_scale_aint:
        type:
        - number
        - 'null'
        default: null
        description: Atom-atom covalent-radii scale.
      compute_angles:
        type: boolean
        default: false
        description: Whether to precompute triplet angles.
      use_path_branch:
        type: boolean
        default: false
        description: Whether to precompute site-centered paths.
      max_paths_per_site:
        type: integer
        minimum: 1
        default: 128
        description: Maximum paths saved per site.
      att_cutoff:
        type: number
        default: 10.0
        description: Attention graph cutoff in **Angstrom**.
      att_max_num_neighbors:
        type: integer
        minimum: 1
        default: 64
        description: Attention graph per-source neighbor cap.
      att_graph_method:
        $ref: graph_types.schema.yaml#/$defs/graphMethod
        default: radius
        description: Attention graph construction method.
      att_min_facet_area:
        $ref: graph_types.schema.yaml#/$defs/minFacetArea
        default: null
        description: Numeric area threshold or strings such as "5%".
      att_cov_radii_scale:
        type: number
        default: 1.5
        description: Attention graph covalent-radii scale.
      use_absorber_mask:
        type: boolean
        default: false
        description: Whether attention/path data are limited to absorber sites.
      max_paths_per_structure:
        type: integer
        minimum: 1
        default: 128
        description: Maximum absorber paths saved per structure.
      mode:
        $ref: dataset_types.schema.yaml#/$defs/descriptorMode
        default: forward
        description: '``forward`` for descriptor-to-spectrum or ``reverse`` for spectrum-to-descriptor.'
      fourier:
        type: boolean
        default: false
        description: Whether to add Fourier-transformed spectra.
      fourier_concat:
        type: boolean
        default: false
        description: Whether Fourier features concatenate real and imaginary components.
      gaussian:
        type: boolean
        default: false
        description: Whether to fit spectra to a Gaussian basis.
      widths_eV:
        type: array
        items:
          type: number
        default:
        - 0.5
        - 1.0
        - 2.0
        - 4.0
        description: Gaussian basis widths in **eV**.
      basis_stride:
        type: integer
        minimum: 1
        default: 4
        description: Energy-grid stride used when creating a Gaussian basis.
      basis_path:
        type:
        - string
        - 'null'
        default: null
        description: Optional serialized spectral basis path.
      descriptors:
        type: array
        minItems: 1
        items:
          $ref: ../descriptors/descriptors.schema.yaml#/$defs/descriptor
        default:
        - descriptor_type: wacsf
          r_min: 1.0
          r_max: 6.0
          n_g2: 16
          n_g4: 32
        description: Descriptor configuration objects.
      root:
        type: string
        description: Directory that stores processed ``.pth`` files.
      preload:
        type: boolean
        default: true
        description: Whether to preload processed samples.
      skip_prepare:
        type: boolean
        default: false
        description: Whether to reuse existing processed files.
      split_ratios:
        type:
        - array
        - 'null'
        items:
          type: number
          minimum: 0
        minItems: 1
        default:
        - 1.0
        $comment: Runtime requires the values to sum to 1.0 when split_indexfile is null.
        description: Optional split ratios.
      split_indexfile:
        type:
        - string
        - 'null'
        default: null
        description: Optional path to split indices.
    $comment: Raw inference YAML is merged with the checkpoint signature before runtime validation. This overlay allows user-provided
      dataset fields such as root and preload when dataset_type and model compatibility come from the checkpoint signature.
    description: User-supplied inference dataset overlay that is merged with the checkpoint dataset signature before runtime
      validation and dataset construction.
description: Dataset schemas backed by ``DatasetRegistry`` classes and dataset constructor signatures.
