$schema: https://json-schema.org/draft/2020-12/schema
$id: envembed.schema.yaml
title: 'XANESNET dataset schema: envembed'
$defs:
  datasetEnvEmbed:
    type: object
    additionalProperties: false
    required:
    - dataset_type
    - root
    properties:
      root:
        type: string
        description: Directory that stores processed ``.pth`` files.
      preload:
        type: boolean
        default: true
        description: Whether to preload processed samples.
      skip_prepare:
        type: boolean
        default: false
        description: Whether to reuse existing processed files.
      split_ratios:
        type:
        - array
        - 'null'
        items:
          type: number
          minimum: 0
        minItems: 1
        default:
        - 1.0
        $comment: Runtime requires the values to sum to 1.0 when split_indexfile is null.
        description: Optional split ratios.
      split_indexfile:
        type:
        - string
        - 'null'
        default: null
        description: Optional path to split indices.
      dataset_type:
        const: envembed
        description: Registered dataset type name.
      widths_eV:
        type: array
        items:
          type: number
        default:
        - 0.2
        - 1.0
        - 2.0
        - 4.0
        description: Gaussian basis widths in **eV**.
      basis_stride:
        type: integer
        minimum: 1
        default: 4
        description: Energy-grid stride used when creating a Gaussian basis.
      basis_path:
        type:
        - string
        - 'null'
        default: null
        description: Optional serialized spectral basis path.
      env_radius:
        type:
        - number
        - 'null'
        default: null
        description: Periodic-neighbor cutoff in **Angstrom** for structures.
      descriptors:
        type: array
        minItems: 1
        items:
          $ref: ../../descriptors/descriptors.schema.yaml#/$defs/descriptor
        default:
        - descriptor_type: wacsf
          r_min: 1.0
          r_max: 6.0
          n_g2: 16
          n_g4: 32
        description: Descriptor configuration objects.
    description: Dataset that creates absorber-centered environment embeddings.
description: Dataset schemas backed by ``DatasetRegistry`` classes and dataset constructor signatures.
