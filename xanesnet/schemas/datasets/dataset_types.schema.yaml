$schema: https://json-schema.org/draft/2020-12/schema
$id: dataset_types.schema.yaml
title: XANESNET dataset value types
$defs:
  datasetType:
    type: string
    enum:
    - descriptor
    - descriptor_mp
    - envembed
    - envembed_mp
    - geometrygraph
    - geometrygraph_mp
    - gemnet
    - gemnet_mp
    - gemnet_oc
    - gemnet_oc_mp
    - e3ee
    - e3ee_mp
    - e3ee_full
    - e3ee_full_mp
    - richgraph
    description: Dataset registry key accepted by ``DatasetRegistry.get``.
  descriptorMode:
    type: string
    enum:
    - forward
    - reverse
    description: Descriptor dataset spectrum direction mode documented by ``DescriptorDataset``.
  descriptorModeForward:
    const: forward
    description: Forward descriptor dataset mode required when Fourier or Gaussian transforms are enabled.
description: Dataset schemas backed by ``DatasetRegistry`` classes and dataset constructor signatures.
