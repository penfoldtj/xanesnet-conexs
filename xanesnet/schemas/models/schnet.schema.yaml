$schema: https://json-schema.org/draft/2020-12/schema
$id: schnet.schema.yaml
title: 'XANESNET model schema: schnet'
$defs:
  modelSchNet:
    type: object
    additionalProperties: false
    required:
    - model_type
    - reduce_channels_2
    properties:
      hidden_channels:
        type: integer
        minimum: 1
        default: 128
        description: Atom embedding dimension used throughout all interaction blocks.
      reduce_channels_1:
        type: integer
        minimum: 1
        default: 64
        description: Output dimension of the first post-interaction linear layer.
      num_filters:
        type: integer
        minimum: 1
        default: 128
        description: Number of filters in the CFConv layers and filter MLP.
      num_interactions:
        type: integer
        minimum: 1
        default: 6
        description: Number of interaction blocks.
      num_gaussians:
        type: integer
        minimum: 2
        default: 50
        description: Number of Gaussian basis functions for distance encoding.
      cutoff:
        type: number
        default: 10.0
        description: Radial cutoff distance. **Angstrom**.
      mean_spectrum:
        oneOf:
        - type: array
          items:
            type: number
        - type: 'null'
        default: null
        $comment: Runtime requires len(mean_spectrum) == reduce_channels_2 when provided.
        description: Optional reference mean spectrum for residual learning. If provided, it is added back on every forward
          pass after the output head. Its length must equal ``reduce_channels_2``. ``(reduce_channels_2,)``
      model_type:
        const: schnet
        description: Model type identifier string.
      reduce_channels_2:
        $ref: ../shared/value_types.schema.yaml#/$defs/autoPositiveInteger
        description: Output dimension of the second post-interaction linear layer (equals the spectral output size).
    description: SchNet continuous-filter convolutional neural network for molecular property prediction.
  modelTrainSchNet:
    $ref: '#/$defs/modelSchNet'
    description: Training view of modelSchNet; automatic dimension fields may use the case-insensitive auto token.
  modelInferSchNet:
    $ref: '#/$defs/modelSchNet'
    description: Inference view of modelSchNet; runtime validation rejects unresolved auto values after checkpoint merge.
description: Model schemas backed by ``ModelRegistry`` classes and model constructor signatures.
