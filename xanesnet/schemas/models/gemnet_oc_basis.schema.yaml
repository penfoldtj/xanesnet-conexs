$schema: https://json-schema.org/draft/2020-12/schema
$id: gemnet_oc_basis.schema.yaml
title: XANESNET GemNet-OC basis configuration schemas
$defs:
  gemnetOCRBF:
    oneOf:
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: gaussian
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
        trainable:
          type: boolean
          default: false
          description: Whether the GemNet-OC basis parameter is trainable.
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: spherical_bessel
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: bernstein
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
        pregamma_initial:
          type: number
          default: 0.45264
          description: Initial pregamma value used by the GemNet-OC radial basis configuration dictionary.
    description: GemNet-OC radial basis configuration dictionary passed through the ``rbf`` and related basis fields.
  gemnetOCEnvelope:
    oneOf:
    - type: object
      additionalProperties: false
      required:
      - name
      - exponent
      properties:
        name:
          const: polynomial
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
        exponent:
          type: integer
          minimum: 1
          default: 5
          description: Exponent value used by the GemNet-OC envelope configuration dictionary.
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: exponential
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
    description: GemNet-OC envelope configuration dictionary passed through the ``envelope`` field.
  gemnetOCCBF:
    oneOf:
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: gaussian
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
        trainable:
          type: boolean
          default: false
          description: Whether the GemNet-OC basis parameter is trainable.
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: spherical_harmonics
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
    description: GemNet-OC circular basis configuration dictionary passed through the ``cbf`` field.
  gemnetOCSBF:
    oneOf:
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: spherical_harmonics
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: legendre_outer
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
    - type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          const: gaussian_outer
          description: GemNet-OC basis function name dispatched by the basis configuration dictionary.
        trainable:
          type: boolean
          default: false
          description: Whether the GemNet-OC basis parameter is trainable.
    description: GemNet-OC spherical basis configuration dictionary passed through the ``sbf`` field.
description: Model schemas backed by ``ModelRegistry`` classes and model constructor signatures.
