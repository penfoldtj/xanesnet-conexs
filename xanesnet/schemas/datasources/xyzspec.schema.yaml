$schema: https://json-schema.org/draft/2020-12/schema
$id: xyzspec.schema.yaml
title: 'XANESNET datasource schema: xyzspec'
$defs:
  datasourceXYZSpec:
    type: object
    additionalProperties: false
    required:
    - datasource_type
    - xyz_path
    - xanes_path
    properties:
      datasource_type:
        const: xyzspec
        description: Identifier string for this datasource type.
      xyz_path:
        type: string
        description: Path to the directory containing the ``.xyz`` files.
      xanes_path:
        type: string
        description: Path to the directory containing the ``.txt`` spectra files.
    description: Datasource for paired XYZ coordinate files and XANES spectra.
description: Datasource schemas backed by ``DataSourceRegistry`` classes and datasource constructor signatures.
