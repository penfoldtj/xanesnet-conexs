$schema: https://json-schema.org/draft/2020-12/schema
$id: multixyzspec.schema.yaml
title: 'XANESNET datasource schema: multixyzspec'
$defs:
  datasourceMultiXYZSpec:
    type: object
    additionalProperties: false
    required:
    - datasource_type
    - root_path
    properties:
      datasource_type:
        const: multixyzspec
        description: Identifier string for this datasource type.
      root_path:
        type: string
        description: Path to the root directory containing the subdirectories.
    description: Datasource for multiple paired XYZ coordinate files and XANES spectra.
description: Datasource schemas backed by ``DataSourceRegistry`` classes and datasource constructor signatures.
