$schema: https://json-schema.org/draft/2020-12/schema
$id: descriptor_types.schema.yaml
title: XANESNET descriptor value types
$defs:
  descriptorType:
    type: string
    enum:
    - wacsf
    - rdc
    - mace
    - direct
    description: Descriptor registry key accepted by ``DescriptorRegistry.get``.
  wacsfParameterisation:
    type: string
    enum:
    - shifted
    - centred
    description: WACSF G2/G4 grid strategy accepted by the WACSF descriptor constructor.
description: Descriptor schemas backed by ``DescriptorRegistry`` classes imported by ``xanesnet.descriptors``.
