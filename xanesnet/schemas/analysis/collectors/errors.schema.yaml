$schema: https://json-schema.org/draft/2020-12/schema
$id: errors.schema.yaml
title: XANESNET error-metric collector schemas
$comment: ErrorMetrics accepts collector_type plus loss_type and forwards every remaining loss-specific field as **loss_kwargs
  into LossRegistry.create(...). The branches below intentionally mirror the selected loss constructor parameters, not only
  the ErrorMetrics constructor signature.
$defs:
  collectorErrorMetricMse:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    properties:
      loss_type:
        const: mse
        description: Identifier string for this loss type.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: Mean squared error loss. Compute a configured loss between prediction and target spectra.
  collectorErrorMetricL1:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    properties:
      loss_type:
        const: l1
        description: Identifier string for this loss type.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: L1 (mean absolute error) loss. Compute a configured loss between prediction and target spectra.
  collectorErrorMetricBce:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    properties:
      loss_type:
        const: bce
        description: Identifier string for this loss type.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: Binary cross-entropy loss with logits. Compute a configured loss between prediction and target spectra.
  collectorErrorMetricEmd:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    properties:
      loss_type:
        const: emd
        description: Identifier string for this loss type.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: Earth Mover's (Wasserstein) distance loss. Compute a configured loss between prediction and target spectra.
  collectorErrorMetricWcc:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    properties:
      loss_type:
        const: wcc
        description: Identifier string for this loss type.
      gaussian_hwhm:
        type: integer
        minimum: 1
        default: 10
        description: Half-width at half-maximum of the Gaussian weight function in spectral bins. Defaults to ``10``.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: Weighted cross-correlation (WCC) loss. Compute a configured loss between prediction and target spectra.
  collectorErrorMetricSpecplus:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    properties:
      loss_type:
        const: specplus
        description: Identifier string for this loss type.
      blur_sigma_bins:
        type: number
        default: 5.0
        description: Gaussian blur width in spectral bins for the coarse component. Defaults to ``5.0``.
      alpha:
        type: number
        default: 0.4
        description: Weight for the coarse loss ``Lc``. Defaults to ``0.4``.
      beta:
        type: number
        default: 0.6
        description: Weight for the detail loss ``Ld``. Defaults to ``0.6``.
      gamma:
        type: number
        default: 0.2
        description: Weight for the gradient loss ``Lg``. Defaults to ``0.2``.
      huber_delta:
        type: number
        default: 0.01
        description: Transition point for the Huber loss. Defaults to ``0.01``.
      kappa_peak:
        type: number
        default: 0.15
        description: Amplitude of the peak-aware weight boost applied to ``Ld``. Defaults to ``0.15``.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: Multi-component spectral loss combining blurred, detail, and gradient terms. Compute a configured loss between
      prediction and target spectra.
  collectorErrorMetricMkssim1D:
    type: object
    additionalProperties: false
    required:
    - collector_type
    - loss_type
    - N
    properties:
      loss_type:
        const: mkssim1d
        description: Identifier string for this loss type.
      N:
        type: integer
        minimum: 1
        description: Length of the input signal.
      fractions:
        type: array
        items:
          type: number
        default:
        - 0.01
        - 0.05
        - 0.1
        - 0.15
        - 0.2
        - 0.25
        description: Kernel size fractions of ``N`` for each SSIM scale. Defaults to ``[0.01, 0.05, 0.10, 0.15, 0.2, 0.25]``.
      data_range:
        type: number
        default: 1.0
        description: Dynamic range of the signal (``max - min``). Defaults to ``1.0``.
      K:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: number
        default:
        - 0.01
        - 0.03
        description: Stability constants ``(K1, K2)`` for luminance and contrast-structure terms. Defaults to ``(0.01, 0.03)``.
      device:
        type: string
        default: cpu
        description: Compatibility argument retained for configuration parity. Kernels are moved to the device of ``preds``
          during ``forward``. Defaults to ``'cpu'``.
      use_weighted_sum:
        type: boolean
        default: false
        description: If ``True``, combine scales via weighted sum instead of the default multiplicative combination. Defaults
          to ``False``.
      weights:
        oneOf:
        - type: array
          items:
            type: number
        - type: 'null'
        default: null
        description: Per-scale weights when ``use_weighted_sum=True``. If ``None``, uniform weights are used. Defaults to
          ``None``.
      final_combine:
        type: boolean
        default: true
        description: If ``True``, collapse scales into a single map. If ``False``, return a per-scale stack. Defaults to ``True``.
      final_mean:
        type: boolean
        default: true
        description: If ``True``, reduce the loss map to one value per batch element. Defaults to ``True``.
      collector_type:
        const: error_metric
        description: Registered collector name from the analysis configuration.
    description: Multi-kernel SSIM loss for 1-D signals. Compute a configured loss between prediction and target spectra.
description: Error-metric collector schemas. Loss-specific fields are forwarded by ``ErrorMetrics`` to ``LossRegistry.create``
  and are validated against the selected loss constructor.
