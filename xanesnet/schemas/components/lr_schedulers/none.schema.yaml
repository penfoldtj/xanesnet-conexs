$schema: https://json-schema.org/draft/2020-12/schema
$id: none.schema.yaml
title: 'XANESNET learning-rate scheduler schema: none'
$defs:
  lrSchedulerNone:
    type: object
    additionalProperties: false
    required:
    - lr_scheduler_type
    properties:
      lr_scheduler_type:
        $ref: ../component_types.schema.yaml#/$defs/lrSchedulerTypeNoneOrNo
        description: Registry key passed to ``LRSchedulerRegistry.get``.
      last_epoch:
        type: integer
        default: -1
        description: Last epoch index passed to ``torch.optim.lr_scheduler.LRScheduler``.
    description: Learning-rate scheduler registered to ``NoOpLRScheduler``; leaves optimizer learning rates unchanged.
description: Reusable component value schemas backed by activation, optimizer, initializer, and scheduler registries.
