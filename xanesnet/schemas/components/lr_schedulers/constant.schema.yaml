$schema: https://json-schema.org/draft/2020-12/schema
$id: constant.schema.yaml
title: 'XANESNET learning-rate scheduler schema: constant'
$defs:
  lrSchedulerConstant:
    type: object
    additionalProperties: false
    required:
    - lr_scheduler_type
    properties:
      lr_scheduler_type:
        const: constant
        description: Registry key passed to ``LRSchedulerRegistry.get``.
      factor:
        type: number
        default: 0.3333333333333333
        description: Multiplicative learning-rate factor forwarded to ``ConstantLR``.
      total_iters:
        type: integer
        minimum: 1
        default: 5
        description: Number of iterations for which ``ConstantLR`` applies the factor.
      last_epoch:
        type: integer
        default: -1
        description: Last epoch index forwarded to the PyTorch scheduler.
    description: Learning-rate scheduler registered to ``torch.optim.lr_scheduler.ConstantLR``.
description: Reusable component value schemas backed by activation, optimizer, initializer, and scheduler registries.
