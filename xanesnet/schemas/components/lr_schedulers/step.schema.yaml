$schema: https://json-schema.org/draft/2020-12/schema
$id: step.schema.yaml
title: 'XANESNET learning-rate scheduler schema: step'
$defs:
  lrSchedulerStep:
    type: object
    additionalProperties: false
    required:
    - lr_scheduler_type
    - step_size
    properties:
      lr_scheduler_type:
        const: step
        description: Registry key passed to ``LRSchedulerRegistry.get``.
      step_size:
        type: integer
        minimum: 1
        description: Period of learning-rate decay forwarded to ``StepLR``.
      gamma:
        type: number
        default: 0.1
        description: Multiplicative decay factor forwarded to ``StepLR``.
      last_epoch:
        type: integer
        default: -1
        description: Last epoch index forwarded to the PyTorch scheduler.
    description: Learning-rate scheduler registered to ``torch.optim.lr_scheduler.StepLR``.
description: Reusable component value schemas backed by activation, optimizer, initializer, and scheduler registries.
