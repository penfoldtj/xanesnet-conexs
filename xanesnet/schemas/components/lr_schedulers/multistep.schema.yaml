$schema: https://json-schema.org/draft/2020-12/schema
$id: multistep.schema.yaml
title: 'XANESNET learning-rate scheduler schema: multistep'
$defs:
  lrSchedulerMultiStep:
    type: object
    additionalProperties: false
    required:
    - lr_scheduler_type
    - milestones
    properties:
      lr_scheduler_type:
        const: multistep
        description: Registry key passed to ``LRSchedulerRegistry.get``.
      milestones:
        type: array
        items:
          type: integer
          minimum: 1
        description: Epoch indices at which ``MultiStepLR`` decays the learning rate.
      gamma:
        type: number
        default: 0.1
        description: Multiplicative decay factor forwarded to ``MultiStepLR``.
      last_epoch:
        type: integer
        default: -1
        description: Last epoch index forwarded to the PyTorch scheduler.
    description: Learning-rate scheduler registered to ``torch.optim.lr_scheduler.MultiStepLR``.
description: Reusable component value schemas backed by activation, optimizer, initializer, and scheduler registries.
