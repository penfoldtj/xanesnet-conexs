$schema: https://json-schema.org/draft/2020-12/schema
$id: exponential.schema.yaml
title: 'XANESNET learning-rate scheduler schema: exponential'
$defs:
  lrSchedulerExponential:
    type: object
    additionalProperties: false
    required:
    - lr_scheduler_type
    - gamma
    properties:
      lr_scheduler_type:
        const: exponential
        description: Registry key passed to ``LRSchedulerRegistry.get``.
      gamma:
        type: number
        description: Multiplicative decay factor forwarded to ``ExponentialLR``.
      last_epoch:
        type: integer
        default: -1
        description: Last epoch index forwarded to the PyTorch scheduler.
    description: Learning-rate scheduler registered to ``torch.optim.lr_scheduler.ExponentialLR``.
description: Reusable component value schemas backed by activation, optimizer, initializer, and scheduler registries.
