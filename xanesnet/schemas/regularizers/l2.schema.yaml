$schema: https://json-schema.org/draft/2020-12/schema
$id: l2.schema.yaml
title: 'XANESNET regularizer schema: l2'
$defs:
  regularizerL2:
    type: object
    additionalProperties: false
    required:
    - regularizer_type
    properties:
      regularizer_type:
        const: l2
        description: Identifier string for this regularizer type.
      weight:
        type: number
        default: 1.0
        description: Scalar multiplier applied to the L2 penalty.
    description: L2 regularization (sum of squared parameter values).
description: Regularizer schemas backed by ``RegularizerRegistry`` classes.
