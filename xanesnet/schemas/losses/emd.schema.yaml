$schema: https://json-schema.org/draft/2020-12/schema
$id: emd.schema.yaml
title: 'XANESNET loss schema: emd'
$defs:
  lossEMD:
    type: object
    additionalProperties: false
    required:
    - loss_type
    properties:
      loss_type:
        const: emd
        description: Identifier string for this loss type.
    description: Earth Mover's (Wasserstein) distance loss.
description: Loss schemas backed by ``LossRegistry`` classes and loss constructor signatures.
