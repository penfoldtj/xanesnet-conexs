$schema: https://json-schema.org/draft/2020-12/schema
$id: mse.schema.yaml
title: 'XANESNET loss schema: mse'
$defs:
  lossMSE:
    type: object
    additionalProperties: false
    required:
    - loss_type
    properties:
      loss_type:
        const: mse
        description: Identifier string for this loss type.
    description: Mean squared error loss.
description: Loss schemas backed by ``LossRegistry`` classes and loss constructor signatures.
